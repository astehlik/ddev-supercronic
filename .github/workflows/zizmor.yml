name: zizmor

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZIZMOR_IMAGE: ghcr.io/woodruffw/zizmor:latest@sha256:3d53be4e0f48952112aa4ca00f45e724b70598082e7202c5c412a6779ca38134
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -v "${GITHUB_WORKSPACE}:/repo" \
            "${ZIZMOR_IMAGE}" \
            /repo/.github/workflows/
